<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>REJAS PERIMETRALES</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f6f7fb;
}

h2 { margin-bottom: 10px; }

.filters {
  margin-bottom: 15px;
}

select, input {
  padding: 6px;
  margin-right: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  margin-top: 10px;
}

th {
  background: #f1f3f6;
  position: sticky;
  top: 0;
  padding: 10px;
}

td {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

tr:hover { background: #eef5ff; }

a {
  color: #2d6cdf;
  text-decoration: none;
}

a:hover { text-decoration: underline; }

#map {
  height: 500px;
  margin-top: 30px;
  border-radius: 10px;
}

.pagination {
  margin-top: 10px;
}

button {
  margin: 2px;
  padding: 5px 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>REJAS PERIMETRALES</h2>

<div class="filters">
  <label>Zona:</label>
  <select id="zonaFilter">
    <option value="TODAS">Todas</option>
  </select>

  <label>Buscar calle:</label>
  <input type="text" id="calleFilter" placeholder="Ej: Corrientes">
</div>

<div id="table"></div>
<div class="pagination" id="pagination"></div>

<h3>Mapa GIS</h3>
<div id="map"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1X29sMRVSMisIlXQfoWVqjwBst2blhjlRTi2JrBDejA0/export?format=csv&gid=0";

let dataGlobal = [];
let filteredData = [];
let currentPage = 1;
const pageSize = 100;

let map;
let markersLayer;

// ================= HELPERS =================
function getCol(row, name) {
  let key = Object.keys(row).find(k =>
    k.trim().toUpperCase() === name.trim().toUpperCase()
  );
  return key ? row[key] : "";
}

// ================= LOAD =================
function loadData() {

  Papa.parse(SHEET_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {

      dataGlobal = results.data;

      fillZoneFilter();
      filteredData = dataGlobal;

      renderTable();
      renderPagination();
      initMap();
      renderMap(filteredData);
    }
  });
}

// ================= ZONES =================
function fillZoneFilter() {

  let select = document.getElementById("zonaFilter");

  let zonas = [...new Set(dataGlobal.map(r => r.Zona).filter(Boolean))];

  zonas.forEach(z => {
    let opt = document.createElement("option");
    opt.value = z;
    opt.textContent = z;
    select.appendChild(opt);
  });
}

// ================= FILTER =================
function applyFilters() {

  let zona = document.getElementById("zonaFilter").value;
  let calle = document.getElementById("calleFilter").value.toUpperCase();

  filteredData = dataGlobal.filter(row => {

    let matchZona = (zona === "TODAS" || row.Zona === zona);
    let matchCalle = !calle || getCol(row, "CALLE").toUpperCase().includes(calle);

    return matchZona && matchCalle;
  });

  currentPage = 1;

  renderTable();
  renderPagination();
  renderMap(filteredData);
}

// ================= TABLE =================
function renderTable() {

  let start = (currentPage - 1) * pageSize;
  let pageData = filteredData.slice(start, start + pageSize);

  if (!pageData.length) {
    document.getElementById("table").innerHTML = "<p>No hay resultados</p>";
    return;
  }

  let hiddenCols = ["N°", "Observaciones", "C1", "C2"];

  let headers = Object.keys(pageData[0]).filter(h => !hiddenCols.includes(h));

  let html = "<table><tr>";

  headers.forEach(h => html += `<th>${h}</th>`);

  html += "</tr>";

  pageData.forEach(row => {

    html += "<tr>";

    headers.forEach(h => {

      let value = row[h] || "";

      if (h.toUpperCase().includes("FOTO") && value) {
        value = `<a href="${value}" target="_blank">Ver</a>`;
      }

      html += `<td>${value}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("table").innerHTML = html;
}

// ================= PAGINATION =================
function renderPagination() {

  let totalPages = Math.ceil(filteredData.length / pageSize);

  let html = "";

  for (let i = 1; i <= totalPages; i++) {
    html += `<button onclick="goPage(${i})">${i}</button>`;
  }

  document.getElementById("pagination").innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
}

// ================= MAP =================
function initMap() {

  map = L.map('map').setView([-34.6037, -58.3816], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  markersLayer = L.layerGroup().addTo(map);
}

function renderMap(data) {

  markersLayer.clearLayers();

  data.forEach(row => {

    if (!row.C1) return;

    let coords = row.C1.split(",");
    let lat = parseFloat(coords[0]);
    let lng = parseFloat(coords[1]);

    if (isNaN(lat) || isNaN(lng)) return;

    let popup = `
      <b>${row.Calle || ""}</b><br>
      Zona: ${row.Zona || ""}<br>
      <a href="${row.Foto || "#"}" target="_blank">Ver foto</a>
    `;

    L.marker([lat, lng])
      .bindPopup(popup)
      .addTo(markersLayer);
  });

  if (markersLayer.getLayers().length > 0) {
    map.fitBounds(markersLayer.getBounds());
  }
}

// ================= EVENTS =================
document.getElementById("zonaFilter").addEventListener("change", applyFilters);
document.getElementById("calleFilter").addEventListener("input", applyFilters);

// ================= INIT =================
loadData();

</script>

</body>
</html>
