<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>REJAS PERIMETRALES</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { font-family: Arial; margin: 20px; background: #f6f7fb; }

.botones button {
  margin: 5px;
  padding: 6px 12px;
  border: none;
  background: #2d6cdf;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
.botones button:hover { background: #1f4fb5; }

#map { height: 500px; margin-bottom: 20px; border-radius: 10px; }

table { width: 100%; border-collapse: collapse; background: white; }
th { background: #f1f3f6; padding: 10px; position: sticky; top: 0; }
td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; }

tr:hover { background: #eef5ff; cursor: pointer; }

.filters { margin: 10px 0; }
</style>
</head>

<body>

<h2>REJAS PERIMETRALES</h2>

<div class="botones">
  <button onclick="cambiarVista('padron')">PADRON</button>
  <button onclick="cambiarVista('2025')">2025</button>
  <button onclick="cambiarVista('2026')">2026</button>
</div>

<!-- PADRON -->
<div id="vistaPadron">
  <div id="map"></div>

  <div class="filters">
    <label>Zona:</label>
    <select id="zonaFilter">
      <option value="TODAS">Todas</option>
    </select>

    <label>Buscar calle:</label>
    <input type="text" id="calleFilter">

    <label>Buscar N°RP:</label>
    <input type="text" id="rpFilter">
  </div>

  <div id="table"></div>
  <div id="pagination"></div>
</div>

<!-- ANALISIS -->
<div id="vistaAnalisis" style="display:none;">
  <h3 id="tituloAnalisis"></h3>
  <div id="botonesMeses"></div>
  <div id="tablaAnalisis"></div>

  <div style="background:white; padding:20px; border-radius:10px; margin-top:20px;">
    <canvas id="graficoAnalisis"></canvas>
  </div>
</div>

<script>

// CONFIG
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1X29sMRVSMisIlXQfoWVqjwBst2blhjlRTi2JrBDejA0/export?format=csv&gid=0";
const URL_ANALISIS = "https://docs.google.com/spreadsheets/d/1hApdn-eXp8OYBdDuCO3KEUTuxaOGL4ANZ-PZdcaIAt0/export?format=csv";

const PLIEGO = {
  "Zona 1": 8103,
  "Zona 2": 1127,
  "Zona 3": 3156,
  "Zona 4": 3839,
  "Zona 5": 581
};

// VARIABLES
let dataGlobal = [];
let filteredData = [];
let currentPage = 1;
const pageSize = 100;

let map;
let markersLayer;
let markersByRP = {};

let dataAnalisis = [];
let chartAnalisis = null;
let anioActual = null;

// HELPERS
function getCol(row, name) {
  let key = Object.keys(row).find(k =>
    k.trim().toUpperCase() === name.trim().toUpperCase()
  );
  return key ? row[key] : "";
}

function parseFecha(fechaStr){
  if(!fechaStr) return null;

  let p = fechaStr.split("/");
  if(p.length === 3){
    return new Date(p[2], p[1]-1, p[0]);
  }

  let f = new Date(fechaStr);
  return isNaN(f) ? null : f;
}

// 🔥 FIX NUMEROS
function parseNumero(valor){
  if(!valor) return 0;

  return parseFloat(
    valor.toString()
      .replace(/\./g, "")
      .replace(",", ".")
  ) || 0;
}

// VISTAS
function cambiarVista(vista){

  document.getElementById("vistaPadron").style.display =
    (vista === "padron") ? "block" : "none";

  document.getElementById("vistaAnalisis").style.display =
    (vista !== "padron") ? "block" : "none";

  if(vista !== "padron"){
    anioActual = vista;
    cargarAnalisis();
  }

  if(vista === "padron"){
    setTimeout(() => {
      if(map){
        map.invalidateSize();
        renderMap(filteredData);
      }
    }, 200);
  }
}

// LOAD PADRON
function loadData() {
  Papa.parse(SHEET_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {

      dataGlobal = results.data;
      fillZoneFilter();
      filteredData = dataGlobal;

      initMap();
      renderAll();
    }
  });
}

// ANALISIS
function cargarAnalisis(){

  if(dataAnalisis.length === 0){
    Papa.parse(URL_ANALISIS, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results){
        dataAnalisis = results.data;
        crearBotonesMeses();
      }
    });
  } else {
    crearBotonesMeses();
  }
}

function crearBotonesMeses(){

  let cont = document.getElementById("botonesMeses");
  cont.innerHTML = "";

  let mesesSet = new Set();

  dataAnalisis.forEach(r => {
    let f = parseFecha(getCol(r,"FECHA"));
    if(!f) return;
    if(f.getFullYear().toString() !== anioActual) return;
    mesesSet.add(f.getMonth());
  });

  const nombres = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];

  [...mesesSet].sort((a,b)=>a-b).forEach(m => {
    let b = document.createElement("button");
    b.innerText = nombres[m];
    b.onclick = () => generarGraficoMes(m);
    cont.appendChild(b);
  });

  document.getElementById("tituloAnalisis").innerText = "AÑO " + anioActual;
}

function generarGraficoMes(mes){

  let zonas = Object.keys(PLIEGO);
  let acumulado = {};
  zonas.forEach(z => acumulado[z] = 0);

  dataAnalisis.forEach(r => {

    let f = parseFecha(getCol(r,"FECHA"));
    if(!f) return;

    if(f.getFullYear().toString() !== anioActual) return;
    if(f.getMonth() !== mes) return;

    let z = getCol(r,"ZONA");
    let l = parseNumero(getCol(r,"L(m)"));

    if(z && acumulado[z] !== undefined){
      acumulado[z] += l;
    }
  });

  renderTablaAnalisis(zonas, acumulado);
  renderGrafico(zonas, acumulado, mes);
}

function renderTablaAnalisis(zonas, data){

  let html = `<table>
    <tr>
      <th>Zona</th>
      <th>ML</th>
      <th>Pliego</th>
      <th>Pendientes</th>
    </tr>`;

  zonas.forEach(z => {
    let ml = data[z] || 0;
    let pl = PLIEGO[z] || 0;
    let pend = pl - ml;

    html += `<tr>
      <td>${z}</td>
      <td>${ml.toFixed(0)}</td>
      <td>${pl}</td>
      <td>${pend.toFixed(0)}</td>
    </tr>`;
  });

  html += `</table>`;
  document.getElementById("tablaAnalisis").innerHTML = html;
}

function renderGrafico(zonas, data, mes){

  if(chartAnalisis) chartAnalisis.destroy();

  const nombresMes = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];

  chartAnalisis = new Chart(document.getElementById("graficoAnalisis"), {
    type: "bar",
    data: {
      labels: zonas,
      datasets: [{
        label: nombresMes[mes],
        data: zonas.map(z => data[z])
      }]
    }
  });
}

// PADRON (igual que antes)
function renderAll(){
  renderTable();
  renderPagination();
  renderMap(filteredData);
}

// INIT
loadData();
cambiarVista("padron");

</script>

</body>
</html>
